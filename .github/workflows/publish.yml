name: Publish to PyPI

# Publishes acumatica-lint to PyPI via PyPI Trusted Publisher (OIDC) — no API
# token required. The PyPI-side configuration was added 2026-05-20 with claims
# pointing at:
#
#   Owner:        studio-b-ai
#   Repository:   acumatica-lint
#   Workflow:     publish.yml
#   Environment:  pypi-publish
#
# Triggers:
#   - release: published — primary path (used for v0.1.0)
#   - push: tags v*       — fallback path
#   - workflow_dispatch   — manual smoke test of OIDC; PyPI rejects same-version
#                           re-uploads with HTTP 400 'File already exists' which
#                           is the success signal for the OIDC TOKEN-MINT step.
#                           If OIDC config is broken we'd see 'invalid-publisher'
#                           before the upload attempt.
#
# See https://docs.pypi.org/trusted-publishers/ for the PyPI-side setup.

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build wheel + publish via Trusted Publisher OIDC
    runs-on: ubuntu-latest
    environment:
      name: pypi-publish
      url: https://pypi.org/project/acumatica-lint/
    permissions:
      # MUST be `id-token: write` for Trusted Publisher OIDC.
      id-token: write
      # `contents: read` is sufficient — we don't push anything back.
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify built artifacts
        run: |
          ls -lh dist/
          test -f dist/acumatica_lint-*.whl
          test -f dist/acumatica_lint-*.tar.gz

      - name: Publish to PyPI (Trusted Publisher OIDC)
        # No `password:` input — the action uses id-token: write OIDC by default
        # when no password is provided. PYPI_API_TOKEN GitHub secret remains as
        # backup but is no longer the active credential.
        uses: pypa/gh-action-pypi-publish@release/v1
